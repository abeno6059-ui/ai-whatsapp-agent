<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI WhatsApp Agent</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{

background:white;

padding:50px;

border-radius:15px;

box-shadow:0 10px 30px rgba(0,0,0,.1);

text-align:center;

}

h1{

color:#25D366;

margin-bottom:10px;

}

p{

font-size:20px;

color:#555;

}

button{

margin-top:30px;

background:#25D366;

color:white;

border:none;

padding:15px 35px;

font-size:18px;

border-radius:8px;

cursor:pointer;

}

button:hover{

background:#1fb85a;

}

</style>

</head>

<body>

<div class="card">

<h1>AI WhatsApp Agent</h1>

<p>حوّل واتساب عملك إلى موظف ذكي يعمل 24/7</p>

<button>ابدأ التجربة المجانية</button>

</div>

</html>
