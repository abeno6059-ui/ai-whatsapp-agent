<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI WhatsApp Agent</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f3f5fa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:60px;
max-width:700px;
border-radius:20px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.08);
}

h1{
font-size:55px;
color:#25D366;
margin-bottom:15px;
}

h2{
font-size:30px;
margin-bottom:20px;
color:#222;
}

p{
font-size:20px;
line-height:1.8;
color:#666;
}

button{
background:#25D366;
border:none;
padding:18px 40px;
font-size:20px;
border-radius:10px;
cursor:pointer;
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}
</style>

</head>

<body>

<div class="card">

<h1>AI WhatsApp Agent</h1>

<h2>حوّل واتساب عملك إلى موظف ذكي يعمل 24/7</h2>

<p>
استقبل الزبناء، جاوب على الأسئلة، واحجز المواعيد تلقائياً عبر WhatsApp باستعمال الذكاء الاصطناعي.
</p>

<button>🚀 ابدأ التجربة المجانية</button>

<br><br>

<button style="background:#333;">
▶ شاهد كيف يعمل
</button>

</div>

</body>

</html>
